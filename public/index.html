<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>41 mecos — Foro Anónimo</title>
  <meta name="description" content="Foro anónimo para estudiantes. Publica, comenta y desahógate sin registro.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== HEADER FIJO ==================== -->
  <header class="header" id="header">
    <div class="header__inner">
      <h1 class="header__logo">
        <span class="header__logo-number">41</span>
        <span class="header__logo-text">mecos</span>
      </h1>
      <p class="header__tagline">foro anónimo · sin filtros · sin registro</p>
    </div>
    <button class="header__user-btn" id="userBtn" title="Cambiar nombre">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      <span class="header__user-name" id="headerUserName">Anónimo</span>
    </button>
  </header>

  <!-- ==================== MODAL NOMBRE ==================== -->
  <div class="modal-overlay" id="nameModal">
    <div class="modal">
      <div class="modal__icon">✏️</div>
      <h2 class="modal__title">Elige tu nombre</h2>
      <p class="modal__desc">Sin espacios, 2-20 caracteres. Puedes cambiarlo cuando quieras.</p>
      <form class="modal__form" id="nameForm">
        <input
          class="modal__input"
          id="nameInput"
          type="text"
          placeholder="tu_nombre"
          maxlength="20"
          minlength="2"
          pattern="[a-zA-Z0-9_\-áéíóúñÁÉÍÓÚÑ]+"
          autocomplete="off"
          required
        />
        <p class="modal__error" id="nameError"></p>
        <button type="submit" class="modal__btn" id="nameBtn">Guardar</button>
      </form>
      <button class="modal__close" id="modalClose" title="Cerrar">✕</button>
    </div>
  </div>

  <!-- ==================== CONTENIDO ==================== -->
  <main class="main">

    <!-- Formulario de nueva publicación -->
    <section class="composer" id="composer">
      <div class="composer__avatar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
      <form class="composer__form" id="postForm" enctype="multipart/form-data">
        <textarea
          class="composer__textarea"
          id="postText"
          placeholder="¿Qué quieres contar? Suéltalo aquí..."
          maxlength="1000"
          rows="3"
        ></textarea>

        <!-- Image preview -->
        <div class="composer__preview" id="imagePreview" style="display: none;">
          <img class="composer__preview-img" id="previewImg" src="" alt="Preview">
          <button type="button" class="composer__preview-remove" id="removeImage" title="Quitar imagen">✕</button>
        </div>

        <div class="composer__footer">
          <div class="composer__left">
            <label class="composer__attach-btn" id="attachBtn" title="Adjuntar imagen">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
              <input type="file" id="imageInput" accept="image/*" style="display: none;">
            </label>
            <span class="composer__charcount" id="charCount">0 / 1000</span>
          </div>
          <button type="submit" class="composer__btn" id="postBtn">
            <svg class="composer__btn-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            Publicar
          </button>
        </div>
      </form>
    </section>

    <!-- Banner de nuevos posts -->
    <button class="new-posts-banner" id="newPostsBanner" style="display: none;">
      🔔 Hay nuevas publicaciones — toca para cargar
    </button>

    <!-- Feed de publicaciones -->
    <section class="feed" id="feed">
      <!-- Las publicaciones se renderizan aquí dinámicamente -->
    </section>

    <!-- Estado vacío -->
    <div class="empty-state" id="emptyState">
      <div class="empty-state__icon">🫠</div>
      <p class="empty-state__text">Aún no hay publicaciones.<br>¡Sé el primero en decir algo!</p>
    </div>

  </main>

  <!-- Toast de notificación -->
  <div class="toast" id="toast"></div>

  <script src="app.js"></script>
</body>
</html>
